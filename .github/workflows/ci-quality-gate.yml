name: CI Quality Gate

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate skill frontmatter
        run: python scripts/validate-frontmatter.py skills/

      - name: Validate app frontmatter
        run: python scripts/validate-frontmatter.py apps/ --type app

      - name: Check for broken internal links
        run: |
          echo "Checking for broken internal links..."
          find . -name '*.md' -not -path './.git/*' | while read f; do
            grep -oP '\[.*?\]\(((?!http)[^)]+)\)' "$f" | grep -oP '\(([^)]+)\)' | tr -d '()' | while read link; do
              # Resolve relative to the file's directory
              dir=$(dirname "$f")
              target="$dir/$link"
              if [ ! -e "$target" ] && [ ! -e "$link" ]; then
                echo "::warning file=$f::Broken link: $link"
              fi
            done
          done

      - name: Check for secrets
        run: |
          echo "Scanning for potential secrets..."
          PATTERNS='(AKIA[0-9A-Z]{16}|sk-[a-zA-Z0-9]{48}|ghp_[a-zA-Z0-9]{36}|-----BEGIN (RSA |EC )?PRIVATE KEY-----)'
          if grep -rPn "$PATTERNS" --include='*.md' --include='*.py' --include='*.sh' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.js' --include='*.ts' --include='*.jsx' --include='*.tsx' --include='*.html' . 2>/dev/null; then
            echo "::error::Potential secrets detected! Please remove them before merging."
            exit 1
          fi
          echo "No secrets found."

  structure:
    name: Validate Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check skill structure
        run: |
          echo "Validating skill folder structure..."
          for skill_dir in skills/*/; do
            [ "$(basename "$skill_dir")" = "_template" ] && continue
            for skill in "$skill_dir"*/; do
              [ ! -d "$skill" ] && continue
              if [ ! -f "$skill/SKILL.md" ]; then
                echo "::error::Missing SKILL.md in $skill"
                exit 1
              fi
            done
          done
          echo "All skill structures valid."

      - name: Check app structure
        run: |
          echo "Validating app folder structure..."
          for app_dir in apps/*/; do
            [ "$(basename "$app_dir")" = "_template" ] && continue
            for app in "$app_dir"*/; do
              [ ! -d "$app" ] && continue
              if [ ! -f "$app/README.md" ]; then
                echo "::error::Missing README.md in $app"
                exit 1
              fi
            done
          done
          echo "All app structures valid."
