name: Bug Report
description: Report an issue with a skill or app
title: "[Bug] "
labels: ["bug"]
body:
  - type: input
    id: item
    attributes:
      label: Affected Skill or App
      placeholder: e.g., skills/engineering/pr-review or apps/dashboards/sales-pipeline
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Open the skill in Claude Code
        2. Run the trigger phrase "..."
        3. Observe the error

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Claude Code (CLI)
        - Cowork (Desktop)
        - Cursor
        - Other
